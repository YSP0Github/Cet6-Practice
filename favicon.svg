<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book body -->
  <g transform="translate(256,256)">
    <!-- Left page -->
    <path d="M-8,-120 L-120,-110 L-120,100 L-8,110 Z" fill="#E8F0FE" opacity="0.95"/>
    <!-- Right page -->
    <path d="M8,-120 L120,-110 L120,100 L8,110 Z" fill="#FFFFFF" opacity="0.95"/>
    <!-- Spine -->
    <rect x="-10" y="-122" width="20" height="234" rx="4" fill="#1E40AF" opacity="0.3"/>
    <!-- Text lines on left page -->
    <line x1="-100" y1="-70" x2="-20" y2="-73" stroke="#93B8E8" stroke-width="6" stroke-linecap="round"/>
    <line x1="-100" y1="-40" x2="-20" y2="-43" stroke="#93B8E8" stroke-width="6" stroke-linecap="round"/>
    <line x1="-100" y1="-10" x2="-20" y2="-13" stroke="#93B8E8" stroke-width="6" stroke-linecap="round"/>
    <line x1="-100" y1="20" x2="-60" y2="22" stroke="#93B8E8" stroke-width="6" stroke-linecap="round"/>
    <!-- Text lines on right page -->
    <line x1="20" y1="-73" x2="100" y2="-70" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="-43" x2="100" y2="-40" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="-13" x2="100" y2="-10" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="17" x2="70" y2="20" stroke="#CBD5E1" stroke-width="6" stroke-linecap="round"/>
    <!-- CET6 text -->
    <text x="0" y="70" text-anchor="middle" fill="#1E40AF" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="40" letter-spacing="2">CET6</text>
  </g>
</svg>
