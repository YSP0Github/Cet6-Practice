<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>六级真题练习系统 · 套题预览</title>
  <meta name="description" content="六级真题原文与解析左右分屏预览，支持听力播放与快捷跳转。" />
  <meta name="theme-color" content="#071421" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="preview-shell">
  <div class="preview-header">
    <div class="preview-headline">
      <div class="preview-title-block">
        <h1 id="previewTitle">真题原文与解析</h1>
      </div>
      <p id="previewSubtitle" class="preview-subtitle">左侧显示真题 PDF，右侧显示解析 PDF，附带本套听力资源。</p>
    </div>
    <div class="preview-toolbar">
      <div id="previewShortcuts" class="preview-shortcuts" aria-label="同年度快捷跳转"></div>
      <div class="preview-actions">
        <a class="button button-secondary" href="index.html">返回首页</a>
        <button class="button button-primary" id="previewRefresh">刷新页面</button>
      </div>
    </div>
  </div>

  <main class="preview-grid">
    <section class="preview-column preview-main">
      <div class="preview-panel preview-panel-large preview-panel-has-action">
        <div class="preview-panel-header">
          <div class="preview-panel-label">真题原文</div>
          <div id="previewAudioBar" class="preview-audio-bar" aria-label="本套听力资源">
            <audio id="previewAudioPlayer" controls preload="none"></audio>
          </div>
        </div>
        <button type="button" class="preview-panel-action" id="toggleParseBtn" aria-pressed="false">隐藏解析</button>
        <iframe id="mainPdf" title="真题原文预览"></iframe>
      </div>
    </section>
    <div class="preview-resizer" id="previewResizer" role="separator" aria-label="调整原文与解析宽度" aria-orientation="vertical" tabindex="0"></div>
    <section class="preview-column preview-parse">
      <div class="preview-panel preview-panel-large">
        <div class="preview-panel-header">
          <div class="preview-panel-label">解析</div>
        </div>
        <iframe id="parsePdf" title="解析预览"></iframe>
      </div>
    </section>
  </main>

  <div id="mobileTabs" class="mobile-tabs" style="display:none;">
    <div class="mobile-tab-bar">
      <button type="button" class="mobile-tab active" data-tab="audio">听力</button>
      <button type="button" class="mobile-tab" data-tab="exam">真题</button>
      <button type="button" class="mobile-tab" data-tab="parse">解析</button>
    </div>
    <div class="mobile-tab-content" id="mobileTabAudio">
      <div id="mobileAudioBar" class="mobile-audio-bar">
        <audio id="mobileAudioPlayer" controls preload="none"></audio>
      </div>
      <p class="empty-state" style="padding:40px 20px;text-align:center;">本套暂无听力资源</p>
    </div>
    <div class="mobile-tab-content" id="mobileTabExam" style="display:none;">
      <div class="mobile-pdf-viewer" id="mobileExamViewer">
        <canvas id="mobileExamCanvas"></canvas>
      </div>
    </div>
    <div class="mobile-tab-content" id="mobileTabParse" style="display:none;">
      <div class="mobile-pdf-viewer" id="mobileParseViewer">
        <canvas id="mobileParseCanvas"></canvas>
      </div>
    </div>
  </div>

  <footer class="preview-footer">
    <p id="previewNote">如果浏览器无法直接加载本地 PDF，请使用 Edge、Firefox 或将 PDF 另存后再打开。</p>
  </footer>

  <script src="library-data.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="preview.js"></script>
</body>
</html>
